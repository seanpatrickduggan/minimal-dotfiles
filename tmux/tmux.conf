# Minimal tmux.conf — plugin-free, targets tmux 2.7+

# -------------------------------------------------------------------
# Core
# -------------------------------------------------------------------
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
# detach-on-destroy off — requires tmux 3.2+, uncomment if available
# set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
# "screen-256color" is safer on RHEL 8 (tmux-256color terminfo may not exist)
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
setw -g mode-keys vi
set -g mouse on

# -------------------------------------------------------------------
# Status bar (tmux 2.7 compatible — uses -fg/-bg, not -style)
# -------------------------------------------------------------------
set -g status-bg colour235
set -g status-fg colour248
set -g status-left "#[fg=colour0,bg=colour4,bold] #S #[default] "
set -g status-left-length 30
set -g status-right "#[fg=colour248] %m/%d/%Y %I:%M %p "
setw -g window-status-current-fg colour0
setw -g window-status-current-bg colour4
setw -g window-status-current-attr bold
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# -------------------------------------------------------------------
# Keybindings
# -------------------------------------------------------------------
bind ^X lock-server
bind ^C new-window -c "$HOME"
bind ^D detach
bind * list-clients

bind H previous-window
bind L next-window

bind r command-prompt "rename-window %%"
bind R source-file ~/.tmux.conf \; display "Config reloaded"
bind ^A last-window
bind ^W list-windows
bind w list-windows
bind z resize-pane -Z
bind ^L refresh-client
bind l refresh-client

bind | split-window
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind '"' choose-window

# Pane navigation (vim-style, prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Direct Ctrl+hjkl pane navigation (no prefix needed)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Pane resize
bind -r -T prefix , resize-pane -L 20
bind -r -T prefix . resize-pane -R 20
bind -r -T prefix - resize-pane -D 7
bind -r -T prefix = resize-pane -U 7

bind : command-prompt
bind * setw synchronize-panes
bind P set pane-border-status
bind c kill-pane
bind x swap-pane -D
bind S choose-session

bind K send-keys "clear" \; send-keys "Enter"

# Vi copy mode
bind C-k copy-mode \; send-keys k0
bind / copy-mode \; send-keys ?
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
